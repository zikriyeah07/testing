
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Hello World</title>
		<style>
			body { font-family: system-ui, Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f6f8fa; }
			.card { text-align:center; padding:2rem; background:#fff; border-radius:10px; box-shadow:0 6px 20px rgba(16,24,40,0.08); }
			button { margin-top:1rem; padding:0.5rem 1rem; font-size:1rem; }
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Hello, world!</h1>
			<p>This is a minimal Hello World page.</p>
			<button id="btn">Show greeting</button>
		</div>

		<script>
			console.log('Hello, world!');
			document.getElementById('btn').addEventListener('click', function(){
				alert('Hello, world!');
			});
		</script>
	</body>
</html>
